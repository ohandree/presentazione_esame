<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Home</title>
<link rel="stylesheet" href="shared.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    min-height: 100vh;
    gap: 2rem;
    padding: 2rem;
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    pointer-events: none;
    z-index: 2;
  }
  .corner--tl { top: 16px; left: 16px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); border-radius: 4px 0 0 0; box-shadow: -4px -4px 16px var(--accent-glow); }
  .corner--tr { top: 16px; right: 16px; border-top: 2px solid var(--accent2); border-right: 2px solid var(--accent2); border-radius: 0 4px 0 0; box-shadow: 4px -4px 16px var(--accent2-glow); }
  .corner--bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); border-radius: 0 0 0 4px; box-shadow: -4px 4px 16px var(--accent-glow); }
  .corner--br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--accent2); border-right: 2px solid var(--accent2); border-radius: 0 0 4px 0; box-shadow: 4px 4px 16px var(--accent2-glow); }

  /* Badge accent line */
  .badge-line {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px;
    position: relative; z-index: 1;
  }

  .home-eyebrow {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    position: relative; z-index: 1;
    animation: fade-in-up 0.6s ease both;
  }

  .home-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    font-weight: 900;
    color: var(--accent);
    text-align: center;
    letter-spacing: 0.15em;
    line-height: 1.5;
    position: relative; z-index: 1;
    text-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(37,99,235,0.2);
    animation: fade-in-up 0.6s ease 0.1s both;
  }
  .home-title span {
    display: block;
    font-size: 0.45em;
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px var(--accent2-glow);
    margin-top: 0.4em;
  }

  /* Logo iniziale */
  .home-logo {
    display: block;
    width: 25%;
    height: auto;
    margin: 0 auto;
    filter: drop-shadow(0 0 30px var(--accent-glow));
    animation: fade-in-up 0.6s ease both;
  }

  .home-subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.52rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.15em;
    position: relative; z-index: 1;
    animation: fade-in-up 0.6s ease 0.2s both;
  }

  /* Avatar frame */
  .avatar-frame {
    width: 180px; height: 180px;
    position: relative;
    z-index: 1;
    animation: fade-in-up 0.6s ease 0.3s both, avatar-float 5s ease-in-out 1s infinite;
  }
  @keyframes avatar-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .avatar-frame-inner {
    width: 100%; height: 100%;
    border: 2px solid var(--accent);
    border-radius: 22px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow:
      0 0 30px var(--accent-glow),
      0 0 60px rgba(37,99,235,0.1),
      inset 0 0 20px rgba(37,99,235,0.05);
    animation: border-pulse 3s ease-in-out infinite;
  }
  @keyframes border-pulse {
    0%, 100% { box-shadow: 0 0 30px var(--accent-glow), inset 0 0 20px rgba(37,99,235,0.05); }
    50% { box-shadow: 0 0 50px var(--accent-glow), 0 0 90px rgba(37,99,235,0.15), inset 0 0 30px rgba(37,99,235,0.08); }
  }
  /* Rotating ring */
  .avatar-frame::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 30px;
    border: 2px dashed rgba(37,99,235,0.25);
    animation: ring-spin 12s linear infinite;
  }
  @keyframes ring-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  /* Accent corner dots */
  .avatar-frame::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 26px;
    border: 1px solid rgba(249,115,22,0.2);
    animation: ring-spin 8s linear infinite reverse;
  }

  .home-info {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(37,99,235,0.2);
    border-radius: 18px;
    padding: 1.4rem 2rem;
    text-align: center;
    max-width: 340px;
    width: 100%;
    position: relative; z-index: 1;
    box-shadow: 0 8px 32px rgba(37,99,235,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
    animation: fade-in-up 0.6s ease 0.4s both;
  }
  .home-info .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    font-weight: 900;
    color: var(--green);
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px var(--green-glow);
  }
  .home-info .school {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--muted);
    line-height: 1.7;
    letter-spacing: 0.03em;
  }
  .home-info .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 0.8rem auto;
  }

  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .start-btn-wrap {
    position: relative; z-index: 1;
    animation: fade-in-up 0.6s ease 0.5s both;
  }
  .start-btn-wrap .btn-primary {
    font-size: 0.8rem;
    padding: 1.1rem 2.8rem;
    letter-spacing: 0.18em;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    animation: particle-float linear infinite;
    opacity: 0;
  }
  @keyframes particle-float {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    10% { opacity: 0.6; transform: translateY(-20px) scale(1); }
    90% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
  }
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="home-title">
  <img src="img/logo.png" alt="Logo" class="home-logo">
  <span>ESAME MATURITA' 2025/2026</span>
</div>

<div class="avatar-frame">
  <div class="avatar-frame-inner">
    <img src="img/testa.png" style="width: 100%;" alt="">
  </div>
</div>

<div class="home-info">
  <div class="name">ANDREA MEI</div>
  <div class="divider"></div>
  <div class="school">
    ITCG Angioy — Informatica e Telecomunic.<br>
    Classe 5C
  </div>
</div>

<div class="pixel-dots">
  <div class="pixel-dot"></div>
  <div class="pixel-dot"></div>
  <div class="pixel-dot"></div>
</div>

<div class="start-btn-wrap">
  <button class="btn-primary" onclick="location.href='main.html'">▶ INIZIA</button>
</div>

<div class="version-tag">v1.0</div>

<script>
  // Spawn floating particles
  function spawnParticle() {
    const colors = ['#2563eb','#f97316','#38bdf8','#10b981'];
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${10+Math.random()*80}vw;
      bottom:${Math.random()*30}vh;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${4+Math.random()*6}s;
      animation-delay:${Math.random()*2}s;
      box-shadow: 0 0 ${size*2}px currentColor;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 10000);
  }
  setInterval(spawnParticle, 600);
</script>
</body>
</html>
