<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeON | Registrazione</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/47e2a34600.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html"><img src="img/logo.png" id="imglogo" alt=""></a>
            </div>
            <ul class="links">   
                <li><a href="magliette.html">T-Shirts</a></li>
                <li><a href="felpe.html">Felpe</a></li>
                <li><a href="pantaloni.html">Pantaloni</a></li>
            </ul>
            <div class="icone">
                <a href="login.html" class="login">
                    <i class="fa-solid fa-user"></i>
                </a>
                <a href="carrello.html" class="cart">
                    <i class="fa-solid fa-bag-shopping"></i>
                </a>
            </div>
          </nav>
    </header>
    <section class="login-container">
        <form class="register-form" onsubmit="event.preventDefault(); window.location.href='login.html';">
            <h2>Accedi al tuo account</h2>
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="form-group">
                <label for="eta">Età:</label>
                <input type="number" id="eta" name="eta" min="0" max="100" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Registrati</button>
            <p>Hai gia un account? <a href="login.html">Accedi</a></p>
        </form>
    </section>
    <footer>
        <center><p>&copy VibeON, tutti i diritti sono riservati</p>
        <div class="social-icons">
            <p class="contattaci">Contattaci: vibeondirezione@gmail.com</p>
            <a href=""><i class="fa-brands fa-square-facebook facebook"></i></a>
            <a href=""><i class="fa-brands fa-square-instagram instagram"></i></a>
            <a href=""><i class="fa-brands fa-square-x-twitter twitter"></i></a>
        </div></center>
    </footer>
</body>
</html>
