<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeON | Carrello</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/47e2a34600.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html"><img src="img/logo.png" id="imglogo" alt=""></a>
            </div>
            <ul class="links">   
                <li><a href="magliette.html">T-Shirts</a></li>
                <li><a href="felpe.html">Felpe</a></li>
                <li><a href="pantaloni.html">Pantaloni</a></li>
            </ul>
            <div class="icone">
                <a href="login.html" class="login">
                    <i class="fa-solid fa-user"></i>
                </a>
                <a href="carrello.html" class="cart">
                    <i class="fa-solid fa-bag-shopping"></i>
                </a>
            </div>
          </nav>
    </header>
    <section class="carrello-container">
        <h1>Il tuo carrello</h1>
        <div class="carrello-card">
            <img src="img/maglia2.png" alt="">
            <div class="carrello-info">
                <p class="titolo-prodotto">VibeON Urban</p>
                <p class="taglia-prodotto">Taglia: M</p>
                <p class="prezzo-prodotto">€29.99</p>
                <button class="rimuovi-carrello">Rimuovi</button>
            </div>
        </div>
        <div class="carrello-card">
            <img src="img/pantalone1.png" alt="">
            <div class="carrello-info">
                <p class="titolo-prodotto">Pantalone Casual</p>
                <p class="taglia-prodotto">Taglia: L</p>
                <p class="prezzo-prodotto">€14.99</p>
                <button class="rimuovi-carrello">Rimuovi</button>
            </div>
        </div>
        <p class="totale">Totale: €44.98</p>
        <label for="pagamento">Seleziona metodo di pagamento</label>
        <form action="">
            <select name="pagamento" id="" required>
                <option value="">Seleziona</option>
                <option value="carta">Carta di Credito</option>
                <option value="paypal">PayPal</option>
                <option value="bonifico">Bonifico Bancario</option>
                <option value="contrassegno">Contrassegno</option>
            </select>
            <br>
            <button class="paga" id="openModal">Paga Ora</button>
        </form>
    </section>
    <footer>
        <center><p>&copy VibeON, tutti i diritti sono riservati</p>
        <div class="social-icons">
            <p class="contattaci">Contattaci: vibeondirezione@gmail.com</p>
            <a href=""><i class="fa-brands fa-square-facebook facebook"></i></a>
            <a href=""><i class="fa-brands fa-square-instagram instagram"></i></a>
            <a href=""><i class="fa-brands fa-square-x-twitter twitter"></i></a>
        </div></center>
    </footer>
</body>
</html>
